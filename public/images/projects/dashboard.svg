<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625"/>
      <stop offset="100%" style="stop-color:#0d0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="800" height="600"/>
  <!-- Chart lines -->
  <path d="M60,450 L200,380 L340,420 L480,300 L620,340 L740,200" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="380" r="6" fill="#10b981"/>
  <circle cx="340" cy="420" r="6" fill="#10b981"/>
  <circle cx="480" cy="300" r="6" fill="#10b981"/>
  <circle cx="620" cy="340" r="6" fill="#10b981"/>
  <circle cx="740" cy="200" r="6" fill="#10b981"/>
  <!-- Bars -->
  <rect x="100" y="480" width="40" height="80" rx="4" fill="#10b981" opacity="0.3"/>
  <rect x="160" y="440" width="40" height="120" rx="4" fill="#10b981" opacity="0.5"/>
  <rect x="220" y="400" width="40" height="160" rx="4" fill="#10b981" opacity="0.7"/>
  <rect x="280" y="360" width="40" height="200" rx="4" fill="url(#accent)"/>
  <!-- Stats cards -->
  <rect x="500" y="60" width="240" height="80" rx="12" fill="#1f1a2e" stroke="#2a2440"/>
  <rect x="520" y="80" width="80" height="10" rx="5" fill="#3a3450"/>
  <rect x="520" y="100" width="120" height="24" rx="4" fill="url(#accent)"/>
  <rect x="500" y="160" width="240" height="80" rx="12" fill="#1f1a2e" stroke="#2a2440"/>
  <rect x="520" y="180" width="80" height="10" rx="5" fill="#3a3450"/>
  <rect x="520" y="200" width="100" height="24" rx="4" fill="url(#accent)" opacity="0.7"/>
  <text x="400" y="540" font-family="system-ui" font-size="14" fill="#5a5070" text-anchor="middle">AI Dashboard Preview</text>
</svg>

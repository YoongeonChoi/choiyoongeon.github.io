<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625"/>
      <stop offset="100%" style="stop-color:#0d0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="800" height="600"/>
  <!-- Phone frame -->
  <rect x="280" y="60" width="240" height="480" rx="32" fill="#1f1a2e" stroke="#3a3450" stroke-width="2"/>
  <rect x="295" y="80" width="210" height="440" rx="24" fill="#0d0b14"/>
  <!-- Status bar -->
  <rect x="310" y="95" width="40" height="8" rx="4" fill="#3a3450"/>
  <circle cx="480" cy="99" r="5" fill="#3a3450"/>
  <!-- App content -->
  <rect x="310" y="120" width="180" height="80" rx="12" fill="url(#accent)" opacity="0.2"/>
  <rect x="325" y="140" width="100" height="10" rx="5" fill="url(#accent)"/>
  <rect x="325" y="160" width="140" height="8" rx="4" fill="#3a3450"/>
  <!-- Cards -->
  <rect x="310" y="220" width="85" height="100" rx="12" fill="#1f1a2e"/>
  <rect x="405" y="220" width="85" height="100" rx="12" fill="#1f1a2e"/>
  <rect x="310" y="340" width="180" height="60" rx="12" fill="#1f1a2e"/>
  <rect x="310" y="420" width="180" height="60" rx="12" fill="#1f1a2e"/>
  <!-- Bottom nav -->
  <rect x="310" y="495" width="180" height="16" rx="8" fill="#2a2440"/>
  <text x="400" y="560" font-family="system-ui" font-size="14" fill="#5a5070" text-anchor="middle">Mobile App Preview</text>
</svg>
